services:
  # ============================================================================
  # Service A: The Gatekeeper (Sidecar Proxy)
  # [Role] Filters egress traffic and isolates the network.
  # ============================================================================
  proxy:
    image: kalaksi/tinyproxy:latest
    container_name: takumi-proxy
    restart: unless-stopped
    volumes:
      # [Config] Read-Only security configuration
      - ./security/tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./security/allow.list:/etc/tinyproxy/allow.list:ro
    networks:
      - takumi-internal
      - takumi-external

  # ============================================================================
  # Service B: The Studio (ComfyUI Application)
  # [Role] The main runtime environment.
  # ============================================================================
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: takumi-comfyui
    
    # --- Security Hardening (The Ironclad) ---
    read_only: true
    security_opt:
      # [Note] gosu requires SETUID, so we cannot use no-new-privileges here.
      # - no-new-privileges:true 
      []
    cap_drop:
      - ALL
    cap_add:
      - CHOWN         # For entrypoint permissions fix
      - SETUID        # For gosu (user switching)
      - SETGID        # For gosu
      - DAC_OVERRIDE  # Fallback for strict file permissions
      - FOWNER        # Fallback for strict ownership
      - SYS_NICE      # For PyTorch optimizations

    # --- Runtime Environment ---
    environment:
      # [Storage] Unified paths (Persisted in takumi-storage)
      - CONDA_ENVS_DIRS=/app/storage/envs
      - CONDA_PKGS_DIRS=/app/storage/pkgs
      - CONDARC=/app/cache/.condarc
      # [Network] Route traffic through Sidecar Proxy
      - http_proxy=http://takumi-proxy:8888
      - https_proxy=http://takumi-proxy:8888
      - no_proxy=localhost,127.0.0.1,ollama
      # [App Config]
      - CLI_ARGS=--listen 0.0.0.0 --port 8188 --preview-method auto
      - PYTHONDONTWRITEBYTECODE=1
      # [External Services]
      - OLLAMA_HOST=http://ollama:11434
      - HF_TOKEN=${HF_TOKEN}
      # [Hardware]
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # [Workflow]
      - TAKUMI_EVENT_STORE_URL=${TAKUMI_EVENT_STORE_URL}

    # --- Volume Mounts ---
    volumes:
      # [System] Ephemeral areas (Write allowed in Read-Only Root)
      - type: tmpfs
        target: /tmp
      - type: tmpfs
        target: /run
      - type: tmpfs
        target: /home/takumi
      # [Persistence] Unified Storage (System State & Conda)
      - takumi-storage:/app/storage
      # [Persistence] Application Root (ComfyUI & Models)
      - takumi-external:/app/external
      # [Cache] Installer History & Catalogs
      - takumi-cache:/app/cache
      # [Cache] Pip Cache (Optimization)
      - pip-cache:/home/takumi/.cache/pip
      # [Logs] App Logs
      - takumi-logs:/app/logs
      
    # --- Orchestration ---
    depends_on:
      proxy:
        condition: service_started
      ollama:
        condition: service_healthy
    networks:
      - takumi-internal
    
    # --- Hardware Resources ---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    tty: true

  # ============================================================================
  # Service C: The Brain (Local LLM)
  # [Role] Provides intelligence for dependency resolution.
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: takumi-ollama
    restart: always

    # [Network]
    ports:
      - "11434:11434"
    networks:
      - takumi-internal
      - takumi-external
    
    # [Persistence]
    volumes:
      - ollama-models:/root/.ollama
    
    # [Hardware] GPU Offloading
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    # [Healthcheck] Essential for depends_on
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 5

# ============================================================================
# Service D: The Secure Tunnel (Tailscale Sidecar)
# [Role] Zero-Trust Network Isolation and Secure API Tunneling
# ============================================================================
  tailscale:
    image: tailscale/tailscale:latest
    container_name: takumi-tailscale
    hostname: takumi-vpn
    environment:
      # Authentication key injected directly into memory (Doppler)
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--accept-dns=false
    volumes:
      - /dev/net/tun:/dev/net/tun
      - type: tmpfs
        target: /var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - takumi-internal
      - takumi-external
    restart: unless-stopped

# ============================================================================
# Service E: The Ingress UI Gateway
# [Role] It receives access from the host and relays it to an isolated ComfyUI.
# ============================================================================
  ui-bridge:
    image: alpine/socat
    container_name: takumi-ui-gateway
    command: tcp-listen:8188,fork,reuseaddr tcp-connect:comfyui:8188
    ports:
      - "127.0.0.1:8188:8188"
    networks:
      - takumi-internal
      - takumi-external
    restart: unless-stopped
    depends_on:
      - comfyui

# ==============================================================================
# Global Definitions
# ==============================================================================
networks:
  takumi-external:
    driver: bridge
  takumi-internal:
    driver: bridge
    internal: true

volumes:
  # System Data
  takumi-storage:
  takumi-external:
  takumi-cache:
  takumi-logs:
  
  # Caches
  pip-cache:
  ollama-models:
  
  # Note: 'takumi-cache' and 'conda-envs' are removed 
  # as they are now consolidated into 'takumi-storage'.